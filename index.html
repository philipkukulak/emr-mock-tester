<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMR Mock Tester</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <header>
      <h1>EMR Mock Tester</h1>
      <p class="subtitle">Emergency Care for Professional Responders &mdash; study quiz</p>

      <div class="controls">
        <label for="chapter-select">Chapter:</label>
        <select id="chapter-select"></select>
        <button id="restart-btn" type="button" title="Reshuffle and start over">&#8635; Restart</button>
      </div>

      <p id="progress" class="progress"></p>
      <p id="chapter-label" class="chapter-label"></p>
      <p id="score" class="score"></p>
    </header>

    <section id="quiz">
      <p id="question" class="question"></p>
      <div id="choices" class="choices"></div>
      <p id="explanation" class="explanation" hidden></p>
    </section>

    <p id="error" class="error" hidden></p>

    <nav class="nav">
      <button id="prev-btn" type="button">&larr; Previous</button>
      <button id="next-btn" type="button">Next &rarr;</button>
    </nav>
  </main>

  <script src="app.js"></script>
</body>
</html>
