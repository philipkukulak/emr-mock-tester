<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMR Mock Tester</title>
  <script>
    (function () {
      var t;
      try { t = localStorage.getItem("emr-theme-v1"); } catch (e) {}
      if (t !== "light" && t !== "dark") {
        t = window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-tabs">
      <a class="navbar-tab active" href="index.html" aria-current="page">Quiz</a>
      <a class="navbar-tab" href="scenarios.html">Scenarios</a>
    </div>
    <button id="theme-btn" class="theme-switch" type="button" role="switch" aria-label="Dark mode" title="Toggle dark mode"></button>
  </nav>

  <main class="card">
    <header>
      <div class="controls">
        <label for="chapter-select">Chapter:</label>
        <select id="chapter-select"></select>
        <label class="difficulty-toggle" title="Show only the hard 'gotcha' questions">
          <input type="checkbox" id="hard-only"> Hard only
        </label>
        <button id="summary-btn" type="button" hidden title="Jump to your results for this chapter">&#9776; View summary</button>
        <button id="restart-btn" type="button" title="Clear answers, reshuffle, and start over">&#8635; Restart</button>
      </div>

      <p id="progress" class="progress"></p>
      <p id="chapter-label" class="chapter-label"></p>
      <p id="score" class="score"></p>
    </header>

    <section id="quiz">
      <p id="question" class="question"></p>
      <div id="choices" class="choices"></div>
      <p id="explanation" class="explanation" hidden></p>
    </section>

    <section id="results" hidden>
      <h2 id="results-heading"></h2>
      <p id="results-score" class="results-score"></p>
      <div id="results-review"></div>
      <div class="results-actions">
        <button id="review-btn" type="button">Review answers</button>
        <button id="restart-chapter-btn" type="button">&#8635; Restart</button>
      </div>
    </section>

    <p id="error" class="error" hidden></p>

    <nav class="nav">
      <button id="prev-btn" type="button">&larr; Previous</button>
      <button id="next-btn" type="button">Next &rarr;</button>
      <button id="finish-btn" type="button" hidden>Finish &check;</button>
    </nav>
  </main>

  <script src="theme.js"></script>
  <script src="app.js"></script>
</body>
</html>
