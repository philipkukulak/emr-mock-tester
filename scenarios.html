<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMR Scenario Practice</title>
  <script>
    (function () {
      var t;
      try { t = localStorage.getItem("emr-theme-v1"); } catch (e) {}
      if (t !== "light" && t !== "dark" && t !== "grey") {
        t = window.matchMedia && matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
      }
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav class="navbar">
    <div class="navbar-tabs">
      <a class="navbar-tab" href="index.html">Quiz</a>
      <a class="navbar-tab active" href="scenarios.html" aria-current="page">Scenarios</a>
    </div>
    <button id="theme-btn" class="navbar-theme" type="button" title="Switch theme (light / dark / grey)"></button>
  </nav>

  <main class="card card--wide">
    <header>
      <div class="controls">
        <select id="category-select" title="Filter scenarios by type">
          <option value="all">All types</option>
          <option value="medical">Medical</option>
          <option value="trauma">Trauma</option>
        </select>
        <select id="scenario-select" title="Pick a specific scenario"></select>
        <button id="random-btn" type="button" title="Draw a random scenario">&#127922; New scenario</button>
      </div>

      <div class="toolbar">
        <button id="timer-btn" type="button" class="chip" title="Tap to start or pause the drill timer">&#9201; 00:00</button>
        <span id="progress-chip" class="chip chip-static" title="Assessment sections revealed to the responder"></span>
        <span class="toolbar-spacer"></span>
        <button id="reveal-all-btn" type="button" class="chip">Reveal all</button>
        <button id="hide-all-btn" type="button" class="chip">Hide all</button>
      </div>
    </header>

    <section id="scenario" hidden>
      <div class="scenario-title-row">
        <h2 id="scenario-title"></h2>
        <span id="scenario-badges"></span>
        <button id="done-btn" type="button" title="Track which scenarios your group has already run"></button>
      </div>

      <div class="dispatch">
        <p class="dispatch-label">Dispatch &mdash; read aloud</p>
        <p id="dispatch-text"></p>
      </div>

      <div id="phases"></div>

      <div class="moderator-zone">
        <p class="moderator-zone-label">&#9888; Moderator only</p>
        <div id="moderator-sections"></div>
      </div>
    </section>

    <p id="error" class="error" hidden></p>

    <p class="scope-note">
      Scenarios follow <em>Emergency Care for Professional Responders</em> (EMR level) &mdash;
      always defer to your local protocols and medical direction.
    </p>
  </main>

  <script src="theme.js"></script>
  <script src="scenarios.js"></script>
</body>
</html>
